<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ANIMATION</title>
    <style>
        body { 
            /* 背景画像を設定 */
            background-image: url('h.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            /* 画像の上に黒い透過レイヤーを重ねて動画を見やすくする */
            background-color: rgba(0, 0, 0, 0.6);
            background-blend-mode: multiply;

            min-height: 100vh; margin: 0; padding: 120px 80px;
            font-family: 'Inter', -apple-system, sans-serif;
            color: #fff; box-sizing: border-box;
        }

        .logo {
            position: fixed; top: 50px; left: 80px;
            font-size: 0.8rem; font-weight: 900;
            letter-spacing: 8px; text-transform: uppercase; opacity: 0.6;
        }

        .controls {
            position: fixed; top: 50px; right: 80px;
            color: rgba(255,255,255,0.6); font-size: 0.7rem;
            cursor: pointer; letter-spacing: 2px;
        }

        .container {
            display: grid;
            gap: 100px;
            justify-content: center;
            margin: 0 auto;
            max-width: 1800px;
            width: 100%;
        }

        .player-wrapper {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .player-wrapper:hover { transform: scale(1.02); }

        iframe { 
            width: 100%; aspect-ratio: 16 / 9;
            border: none; border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        @media (max-width: 1024px) {
            body { padding: 60px 30px; }
            .container { gap: 50px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)) !important; }
        }
    </style>
</head>
<body>

    <div class="logo">THE ANIMATION</div>
    <div class="controls" onclick="nextCols()">GRID: <span id="col-val">2</span></div>
    <div class="container" id="main-container" style="grid-template-columns: repeat(2, minmax(0, 1fr));"></div>

    <script>
        const fileName = 'links.txt';
        const container = document.getElementById('main-container');
        let currentCols = 2;
        let lastRawText = "";

        function nextCols() {
            currentCols = (currentCols >= 5) ? 2 : currentCols + 1;
            container.style.gridTemplateColumns = `repeat(${currentCols}, minmax(0, 1fr))`;
            document.getElementById('col-val').innerText = currentCols;
        }

        async function updatePlayers() {
            try {
                const response = await fetch(`${fileName}?t=${Date.now()}`);
                const text = await response.text();
                if (text === lastRawText) return;
                lastRawText = text;

                container.innerHTML = ""; 
                const lines = text.split(/\r?\n/);

                lines.forEach(line => {
                    if (!line.trim()) return;
                    const parts = line.split(',');
                    const url = parts.length > 1 ? parts[1].trim() : parts[0].trim();
                    const videoId = url.match(/([a-zA-Z0-9_-]{11})/)?.[1];

                    if (videoId) {
                        const div = document.createElement('div');
                        div.className = 'player-wrapper';
                        div.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" allow="fullscreen" allowfullscreen></iframe>`;
                        container.appendChild(div);
                    }
                });
            } catch (e) {}
        }

        setInterval(updatePlayers, 1000);
        updatePlayers();
    </script>
</body>
</html>
